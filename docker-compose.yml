version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: eventsphere-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: eventsphere
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: eventsphere-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: eventsphere-adminer
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - mysql

volumes:
  mysql_data:
